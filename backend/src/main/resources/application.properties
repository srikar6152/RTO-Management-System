# ===========================
# RTO Management System Config
# ===========================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/rto_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=rtoManagementSecretKey2024VeryLongAndSecureBase64EncodedStringForJWT
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.rto=DEBUG
logging.level.org.springframework.security=INFO
